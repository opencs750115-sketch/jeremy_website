<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>台股技術分析儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* 保留您原本的所有 CSS 變數與基礎設定 */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
--bg:#0b0f1a;--bg2:#111827;--bg3:#1a2234;--bg4:#0d1525;
--border:rgba(255,255,255,0.09);
--text:#c8d8e8;--dim:#556878;--accent:#4a9eff;
--up:#26c281;--down:#e85454;--warn:#f5a623;--purple:#a78bfa;
--mono:'Courier New',monospace;
--safe-top:env(safe-area-inset-top,0px);
--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-size:13px;
font-family:-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif;}
.up{color:var(--up)!important;} .dn{color:var(--down)!important;} .warn{color:var(--warn)!important;}

/* 新增：計時器與更新時間樣式 (融入原本設計) */
.auto-info { display: flex; align-items: center; gap: 10px; font-family: var(--mono); font-size: 10px; color: var(--dim); }
.timer-tag { color: var(--accent); font-weight: bold; }

/* ══ 桌機 ≥768px ══ */
@media(min-width:768px){
body{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#topbar{display:flex;align-items:stretch;height:52px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);}
.tb-cell{display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-right:1px solid var(--border);flex-shrink:0;}
.tb-label{font-size:9px;color:var(--dim);letter-spacing:1px;}
.tb-val{font-family:var(--mono);font-size:13px;font-weight:700;}
#tb-name{font-size:14px;font-weight:700;color:#fff;}
.tb-search{display:flex;align-items:center;gap:6px;padding:0 12px;margin-left:auto;border-left:1px solid var(--border);}
.tb-search input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:4px 8px;border-radius:4px;outline:none;height:28px;width:80px;}
.tb-search button{padding:4px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;height:28px;}
#statusbar{height:20px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 10px;font-size:9px;color:var(--dim);font-family:var(--mono);flex-shrink:0;}
}

/* ══ 手機 <768px ══ */
@media(max-width:767px){
body{display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
#mobile-header{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 12px;padding-top:calc(8px + var(--safe-top));}
.mhdr-search{display:flex;align-items:center;gap:6px;flex:1;}
.mhdr-search input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:15px;padding:6px 10px;border-radius:6px;outline:none;font-family:var(--mono);}
.mhdr-search button{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:14px;font-weight:600;}
.m-timer-bar { font-size: 9px; color: var(--dim); display: flex; justify-content: space-between; margin-top: 4px; padding: 0 2px; }
}
/* ... 為了簡潔，此處省略您原本上千行的 CSS，請保留您 index.html 中的所有樣式 ... */
</style>
</head>
<body>

<div id="topbar">
    <div class="tb-cell">
        <div class="tb-label">STOCK</div>
        <div id="tb-name">載入中...</div>
    </div>
    <div class="tb-search">
        <input id="pc-inp-code" type="text" value="2330" placeholder="代碼">
        <button onclick="manualLoad()">載入</button>
    </div>
</div>

<div id="mobile-header">
    <div class="mhdr-search">
        <input id="m-inp-code" type="text" value="2330" placeholder="代碼" inputmode="numeric">
        <button onclick="manualLoad()">載入</button>
    </div>
    <div class="m-timer-bar">
        <span id="m-last-time">最後更新: --:--:--</span>
        <span id="m-countdown">下次自動更新: 15:00</span>
    </div>
    </div>

<div id="statusbar">
    <div style="display:flex; align-items:center; gap:8px;">
        <div id="sdot" class="sdot"></div>
        <span id="status-msg">系統就緒</span>
    </div>
    <div class="auto-info">
        <span id="pc-last-time">最後更新: --:--:--</span>
        <span>|</span>
        <span>自動更新倒數: <span id="pc-countdown" class="timer-tag">15:00</span></span>
    </div>
</div>

<script>
// ══ 設定與變數 ══
let countdownSec = 15 * 60; 
let timerInterval = null;

// ══ 核心：資料抓取 (整合 CORS 與 原本邏輯) ══
async function loadStock() {
    // 取得代碼 (自動判斷手機或桌機輸入框)
    const isMobile = window.innerWidth < 768;
    const code = document.getElementById(isMobile ? 'm-inp-code' : 'pc-inp-code').value.trim();
    
    updateStatus('loading', '資料更新中...');

    // 使用代理伺服器解決 GitHub Pages CORS 問題
    const targetUrl = `https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&stockNo=${code}`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&_=${new Date().getTime()}`;

    try {
        const response = await fetch(proxyUrl);
        const wrapper = await response.json();
        const data = JSON.parse(wrapper.contents);

        if (data.stat !== 'OK') throw new Error('查無代碼');

        // 這裡調用您原本 index.html 中處理資料與畫圖的 function
        // 例如：renderAllCharts(data); processTechnicalAnalysis(data);
        
        console.log("資料更新成功", data);
        
        finishUpdate();
    } catch (err) {
        console.error(err);
        updateStatus('err', '更新失敗');
    }
}

// ══ 計時器邏輯 ══
function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    countdownSec = 15 * 60;
    
    timerInterval = setInterval(() => {
        countdownSec--;
        formatTimeDisplay();
        
        if (countdownSec <= 0) {
            loadStock();
            countdownSec = 15 * 60;
        }
    }, 1000);
}

function formatTimeDisplay() {
    const m = Math.floor(countdownSec / 60);
    const s = countdownSec % 60;
    const timeStr = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    document.getElementById('pc-countdown').innerText = timeStr;
    document.getElementById('m-countdown').innerText = `自動更新: ${timeStr}`;
}

function finishUpdate() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
    
    document.getElementById('pc-last-time').innerText = `最後更新: ${timeStr}`;
    document.getElementById('m-last-time').innerText = `最後更新: ${timeStr}`;
    
    updateStatus('live', '即時連線中');
}

function manualLoad() {
    loadStock();
    startTimer(); // 手動點擊後重新計算 15 分鐘
}

function updateStatus(type, msg) {
    const dot = document.getElementById('sdot');
    const txt = document.getElementById('status-msg');
    dot.className = `sdot ${type}`;
    txt.innerText = msg;
}

// 啟動
window.onload = () => {
    manualLoad();
};
</script>
</body>
</html>
