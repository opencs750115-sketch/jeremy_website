<script>

/* ===============================
   中文名稱對照（可擴充）
================================*/
const STOCK_MAP = {
  "2330": "台積電",
  "2317": "鴻海",
  "2454": "聯發科"
};

function getStockName(code){
  return STOCK_MAP[code] || code;
}

/* ===============================
   TWSE 三大法人 API
================================*/
async function fetchInstitution(code){
  const url = `https://www.twse.com.tw/rwd/zh/fund/T86?response=json&date=&selectType=ALLBUT0999`;
  const res = await fetch(url);
  const data = await res.json();

  const row = data.data.find(r=>r[0]===code);
  if(!row) return null;

  return {
    foreign: parseInt(row[4]),
    trust: parseInt(row[10]),
    dealer: parseInt(row[11]),
    total: parseInt(row[18])
  };
}

/* ===============================
   融資融券
================================*/
async function fetchMargin(code){
  const url = `https://www.twse.com.tw/rwd/zh/marginTrading/MI_MARGN?response=json&date=&selectType=ALL`;
  const res = await fetch(url);
  const data = await res.json();

  const row = data.data.find(r=>r[0]===code);
  if(!row) return null;

  return {
    margin: row[2],
    short: row[3]
  };
}

/* ===============================
   三層濾網買賣點
================================*/
function generateSignal(bars){
  const closes = bars.map(b=>b.close);

  const ma20 = sma(closes,20);
  const ma60 = sma(closes,60);

  const {dif, macd, osc} = calcMACD(closes);

  const last = closes.length-1;

  /* 1️⃣ 趨勢 */
  const trend = ma20[last] > ma60[last];

  /* 2️⃣ 動能 */
  const momentum = osc[last] > 0;

  /* 3️⃣ 量能 */
  const volUp = bars[last].volume > bars[last-1].volume;

  if(trend && momentum && volUp){
    return "🟢 強勢多頭";
  }else if(!trend && !momentum){
    return "🔴 空頭";
  }else{
    return "🟡 盤整";
  }
}

/* ===============================
   RSI + 背離
================================*/
function calcRSI(data, n=14){
  let gains=0, losses=0;
  for(let i=1;i<=n;i++){
    const diff = data[i]-data[i-1];
    if(diff>0) gains+=diff;
    else losses-=diff;
  }
  let rs = gains / losses;
  let rsi = [100 - 100/(1+rs)];

  for(let i=n+1;i<data.length;i++){
    const diff = data[i]-data[i-1];
    if(diff>0){
      gains = (gains*(n-1)+diff)/n;
      losses = (losses*(n-1))/n;
    }else{
      gains = (gains*(n-1))/n;
      losses = (losses*(n-1)-diff)/n;
    }
    rs = gains/losses;
    rsi.push(100 - 100/(1+rs));
  }
  return rsi;
}

function detectDivergence(prices, rsi){
  const n = prices.length;
  if(n<20) return "—";

  const priceTrend = prices[n-1] > prices[n-5];
  const rsiTrend   = rsi[rsi.length-1] < rsi[rsi.length-5];

  if(priceTrend && rsiTrend) return "⚠️ 頂背離";
  if(!priceTrend && !rsiTrend) return "⚠️ 底背離";
  return "正常";
}

/* ===============================
   回測勝率（簡化）
================================*/
function backtest(bars){
  let win=0,total=0;

  for(let i=60;i<bars.length-5;i++){
    const signal = generateSignal(bars.slice(0,i));
    if(signal.includes("多頭")){
      total++;
      if(bars[i+5].close > bars[i].close) win++;
    }
  }
  return total ? (win/total*100).toFixed(1)+"%" : "—";
}

/* ===============================
   主載入改寫
================================*/
async function loadStock(){

  const code = document.getElementById('inp-code').value;

  const {bars, meta} = await fetchYahoo(code,"1d","6mo");

  /* 中文名稱 */
  const name = getStockName(code);

  document.getElementById('tb-name').textContent = name;

  /* 籌碼 */
  const inst = await fetchInstitution(code);
  const margin = await fetchMargin(code);

  console.log("三大法人", inst);
  console.log("融資融券", margin);

  /* 訊號 */
  const signal = generateSignal(bars);

  /* RSI */
  const rsi = calcRSI(bars.map(b=>b.close));
  const div = detectDivergence(bars.map(b=>b.close), rsi);

  /* 勝率 */
  const wr = backtest(bars);

  document.getElementById('r-signal').textContent = signal;
  document.getElementById('r-wr').textContent = wr;

  console.log("RSI背離:", div);

}

</script>
